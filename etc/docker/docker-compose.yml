services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: flip-market-db
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-real_estate_flipping}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./db:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-real_estate_flipping}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:25-alpine
    container_name: flip-market-backend
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    volumes:
      - ../../src/backend:/app
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${DB_HOST:-db}:${DB_PORT:-5432}/${POSTGRES_DB:-real_estate_flipping}
      JWT_SECRET: ${JWT_SECRET:-development-jwt-secret-change-me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      UPLOAD_PATH: ${UPLOAD_PATH:-./storage/uploads}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      EMAIL_MODE: ${EMAIL_MODE:-disabled}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    command: sh -c "yarn install --frozen-lockfile && yarn tsx src/server.ts"

  frontend:
    image: node:25-alpine
    container_name: flip-market-frontend
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    volumes:
      - ../../src/frontend:/app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://backend:4000}
      VITE_USE_MOCKS: ${VITE_USE_MOCKS:-false}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "yarn install --frozen-lockfile && yarn dev --host 0.0.0.0 --port 5173"

