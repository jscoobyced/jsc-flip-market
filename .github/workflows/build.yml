name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "25"

jobs:
  backend-ci:
    name: Backend lint, test, build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: src/backend/yarn.lock

      - name: Install backend dependencies
        run: yarn --cwd src/backend install --frozen-lockfile

      - name: Lint backend
        run: yarn --cwd src/backend lint

      - name: Test backend
        run: yarn --cwd src/backend test

      - name: Build backend
        run: yarn --cwd src/backend build

  frontend-ci:
    name: Frontend lint, test, build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: src/frontend/yarn.lock

      - name: Install frontend dependencies
        run: yarn --cwd src/frontend install --frozen-lockfile

      - name: Lint frontend
        run: yarn --cwd src/frontend lint

      - name: Test frontend
        run: yarn --cwd src/frontend test

      - name: Build frontend
        run: yarn --cwd src/frontend build

  build-and-push-backend-image:
    name: Build and push backend image
    runs-on: ubuntu-24.04
    needs:
      - backend-ci
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Backend image metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_BACKEND_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./src/backend
          file: ./etc/docker/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

  build-and-push-frontend-image:
    name: Build and push frontend image
    runs-on: ubuntu-24.04
    needs:
      - frontend-ci
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Frontend image metadata
        id: meta_frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_FRONTEND_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./etc/docker/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
